<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Kale leaf: upper-left quadrant -->
  <!-- Leaf body: wavy ellipse shape -->
  <ellipse cx="11" cy="10" rx="8" ry="5" fill="#2d7a4f" transform="rotate(-20 11 10)" />
  <!-- Scalloped leaf edge bumps -->
  <circle cx="5" cy="7" r="2.5" fill="#2d7a4f" />
  <circle cx="9" cy="5" r="2.5" fill="#2d7a4f" />
  <circle cx="13" cy="5" r="2.5" fill="#2d7a4f" />
  <circle cx="17" cy="7" r="2.5" fill="#2d7a4f" />
  <circle cx="17" cy="11" r="2.5" fill="#2d7a4f" />
  <circle cx="5" cy="12" r="2.5" fill="#2d7a4f" />
  <!-- Leaf center vein -->
  <line x1="11" y1="14" x2="11" y2="5" stroke="#4ade80" stroke-width="1" stroke-linecap="round" />
  <!-- Side veins -->
  <line x1="11" y1="8" x2="8" y2="6" stroke="#4ade80" stroke-width="0.7" stroke-linecap="round" />
  <line x1="11" y1="10" x2="14" y2="8" stroke="#4ade80" stroke-width="0.7" stroke-linecap="round" />
  <!-- Leaf stem -->
  <rect x="10" y="13" width="2" height="4" rx="1" fill="#2d7a4f" />

  <!-- Fruit (orange/apple): upper-right quadrant -->
  <circle cx="28" cy="12" r="8" fill="#f59e0b" />
  <!-- Fruit highlight spot -->
  <circle cx="25" cy="9" r="2.5" fill="#fde68a" opacity="0.75" />
  <!-- Fruit stem -->
  <rect x="27" y="3" width="2" height="3" rx="1" fill="#78350f" />
  <!-- Leaf on stem -->
  <ellipse cx="30" cy="4" rx="2.5" ry="1.2" fill="#2d7a4f" transform="rotate(-30 30 4)" />

  <!-- Robot face: center-bottom area -->
  <rect x="9" y="22" width="22" height="16" rx="3" fill="#94a3b8" />
  <!-- Robot face screen/inner panel -->
  <rect x="12" y="25" width="16" height="10" rx="2" fill="#e2e8f0" />
  <!-- Robot eyes -->
  <circle cx="16" cy="29" r="2" fill="#1e293b" />
  <circle cx="24" cy="29" r="2" fill="#1e293b" />
  <!-- Robot eye shine dots -->
  <circle cx="16.8" cy="28.2" r="0.6" fill="#ffffff" />
  <circle cx="24.8" cy="28.2" r="0.6" fill="#ffffff" />
  <!-- Robot smile (emerald accent) -->
  <path d="M 16 32.5 Q 20 35 24 32.5" stroke="#2d7a4f" stroke-width="1.2" fill="none" stroke-linecap="round" />
  <!-- Robot antenna -->
  <rect x="19" y="18" width="2" height="4" rx="1" fill="#94a3b8" />
  <circle cx="20" cy="17" r="2" fill="#2d7a4f" />
</svg>
